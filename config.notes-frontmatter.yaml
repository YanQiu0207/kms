server:
  host: 127.0.0.1
  port: 49153
  warmup_on_startup: true

sources:
  - path: E:\github\mykms\data\corpora\e-notes-frontmatter-v1
    excludes:
      - manifest.json

data:
  sqlite: ./data/meta.notes-frontmatter.db
  chroma: ./data/chroma.notes-frontmatter.ab.full
  hf_cache: ./data/hf-cache

models:
  embedding: BAAI/bge-m3
  reranker: BAAI/bge-reranker-v2-m3
  device: cuda
  dtype: float16
  embedding_batch_size: 8
  reranker_batch_size: 32

chunker:
  version: v1
  chunk_size: 800
  chunk_overlap: 100

cleaning:
  enabled: true
  extract_front_matter: true
  drop_front_matter_from_content: true
  normalize_whitespace: true
  dedupe_exact_chunks: true

retrieval:
  recall_top_k: 20
  rerank_top_k: 6
  rerank_candidate_limit: 24
  semantic_enabled: true
  semantic_batch_enabled: true
  rrf_k: 60
  min_output_score: 0.1

abstain:
  top1_min: 0.20
  top3_avg_min: 0.30
  min_hits: 2
  min_total_chars: 150
  min_query_term_count: 2
  min_query_term_coverage: 0.60

verify:
  min_ngram_len: 8
  coverage_threshold: 0.5
