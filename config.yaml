server:
  host: 127.0.0.1
  port: 49153
  warmup_on_startup: true

sources:
  - path: E:\work\blog
    excludes: []

data:
  sqlite: ./data/meta.db
  chroma: ./data/chroma
  hf_cache: ./data/hf-cache

models:
  embedding: BAAI/bge-m3
  reranker: BAAI/bge-reranker-v2-m3
  device: cuda
  dtype: float16
  embedding_batch_size: 8
  reranker_batch_size: 32

chunker:
  version: v1
  chunk_size: 800
  chunk_overlap: 100

retrieval:
  recall_top_k: 20
  rerank_top_k: 6
  rerank_candidate_limit: 24
  rrf_k: 60
  min_output_score: 0.1

abstain:
  top1_min: 0.20
  top3_avg_min: 0.30
  min_hits: 2
  min_total_chars: 150
  min_query_term_count: 2
  min_query_term_coverage: 0.60

verify:
  min_ngram_len: 8
  coverage_threshold: 0.5
